<svg width="760" height="120" viewBox="0 0 760 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .card-bg { fill: #161b22; }
      .card-border { fill: none; stroke: #1D9E75; stroke-width: 1.2; rx: 8; }
      .cert-name { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; fill: #e6edf3; }
      .issuer { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #8b949e; }
      .icon { font-size: 22px; }
    </style>
  </defs>

  <!-- Card 1 -->
  <rect x="2" y="2" width="368" height="116" rx="8" class="card-bg"/>
  <rect x="2" y="2" width="368" height="116" rx="8" fill="none" stroke="#1D9E75" stroke-width="1.2"/>
  <text x="20" y="36" font-size="22" font-family="sans-serif">☁️</text>
  <text x="20" y="68" class="cert-name">OCI 2025 Generative AI Professional</text>
  <text x="20" y="90" class="issuer">Oracle</text>

  <!-- Card 2 -->
  <rect x="390" y="2" width="368" height="116" rx="8" class="card-bg"/>
  <rect x="390" y="2" width="368" height="116" rx="8" fill="none" stroke="#1D9E75" stroke-width="1.2"/>
  <text x="408" y="36" font-size="22" font-family="sans-serif">🏛️</text>
  <text x="408" y="68" class="cert-name">Oracle Database@AWS Architect Professional</text>
  <text x="408" y="90" class="issuer">Oracle</text>
</svg>
