<svg width="1200" height="726" viewBox="0 0 1200 726" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono{font-family:'Courier New',Courier,monospace}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
      .cur{animation:blink 1s step-end infinite}
      @keyframes fa{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      .s1{animation:fa .4s ease .1s both}
      .s2{animation:fa .4s ease .4s both}
      .s3{animation:fa .4s ease .7s both}
      .s4{animation:fa .4s ease 1s both}
    </style>
    <clipPath id="avc">
      <circle cx="108" cy="102" r="63"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="726" fill="#0d1117" rx="16"/>

